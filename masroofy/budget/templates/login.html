{% extends "base.html" %}
{% block title %}Login — Masroofy{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">

        <h3>Login</h3>

        {% for message in messages %}
            <div class="alert alert-danger py-2 mb-3" style="border-radius:7px;font-size:.87rem;">
                {{ message }}
            </div>
        {% endfor %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <input type="text" name="username"
                       class="form-control"
                       placeholder="Username"
                       autofocus>
            </div>

            <div class="mb-4">
                <input type="password" name="password"
                       class="form-control"
                       placeholder="Password">
            </div>

            <button type="submit" class="btn-auth">Login</button>
        </form>

        <p class="auth-footer">
            Don't have an account?
            <a href="{% url 'signup' %}">Sign up</a>
        </p>

    </div>
</div>
{% endblock %}
