{% extends "base.html" %}
{% block title %}Sign Up — Masroofy{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">

        <h3>Create Account</h3>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} py-2 mb-3" style="border-radius:7px;font-size:.87rem;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <input type="text" name="username"
                       class="form-control"
                       placeholder="Username"
                       required autofocus>
            </div>

            <div class="mb-3">
                <input type="email" name="email"
                       class="form-control"
                       placeholder="Email"
                       required>
            </div>

            <div class="mb-3">
                <input type="password" name="password"
                       class="form-control"
                       placeholder="Password"
                       required>
            </div>

            <div class="mb-4">
                <input type="password" name="confirm_password"
                       class="form-control"
                       placeholder="Confirm Password"
                       required>
            </div>

            <button type="submit" class="btn-auth">Sign Up</button>
        </form>

        <p class="auth-footer">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>

    </div>
</div>
{% endblock %}
